<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game of War</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="overlay">
        <div class="top">
            <button id="new-deck">New Deck</button>
            <p id="remaining">Remaining: 52</p>
        </div>

        <h2 id="header">Game of War</h2>

        <div class="scores">
            <h3 id="computer-score">Computer: 0</h3>
            <h3 id="my-score">You: 0</h3>
        </div>

        <div id="cards">
            <div class="card-slot"></div>
            <div class="card-slot"></div>
        </div>

        <button id="draw-cards" class="draw">Draw Card</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
